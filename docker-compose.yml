version: '3.9'

services:
  fastapi:
    build:
      context: ./backend
    env_file:
      - backend/.env
    environment:
      GEMINI_API_KEY: 
      DEFAULT_SYMBOLS: 
    volumes:
      - shared-db:/app/app/db
    ports:
      - '8000:8000'

  api:
    build:
      context: .
      dockerfile: docker/express.Dockerfile
    environment:
      PORT: 4000
      SERVER_API_KEY: 
      GEMINI_API_KEY: 
      FASTAPI_BASE_URL: http://fastapi:8000/api/v1
    volumes:
      - shared-db:/app/backend/app/db
    ports:
      - '4000:4000'
    depends_on:
      - fastapi

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
      VITE_SERVER_API_KEY: 
    ports:
      - '5173:5173'
    depends_on:
      - api

volumes:
  shared-db:
