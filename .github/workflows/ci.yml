name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
        env:
          SERVER_API_KEY: test-api-key-123456
      - run: npm run test
        env:
          SERVER_API_KEY: test-api-key-123456
          SQLITE_PATH: ':memory:'
          SEED_SAMPLE_DATA: 'false'
          FASTAPI_BASE_URL: http://localhost:8000/api/v1
      - run: npm run build
        env:
          SERVER_API_KEY: test-api-key-123456

